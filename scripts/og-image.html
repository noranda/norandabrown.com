<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1200, height=630" />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 1200px;
        height: 630px;
        font-family: 'Figtree', sans-serif;
        background: #09090b;
        color: #fafafa;
        overflow: hidden;
      }

      .card {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
      }

      /* Gradient orbs */
      .card::before {
        content: '';
        position: absolute;
        top: -120px;
        left: -80px;
        width: 500px;
        height: 500px;
        background: radial-gradient(circle, rgba(147, 51, 234, 0.35), transparent 70%);
      }

      .card::after {
        content: '';
        position: absolute;
        bottom: -100px;
        right: -60px;
        width: 450px;
        height: 450px;
        background: radial-gradient(circle, rgba(225, 29, 72, 0.25), transparent 70%);
      }

      .content {
        position: relative;
        z-index: 1;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
      }

      /* NB logo */
      .logo {
        width: 80px;
        height: 80px;
        border-radius: 16px;
        background: linear-gradient(135deg, oklch(0.558 0.288 302.321), oklch(0.592 0.249 0.584));
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 32px;
        color: white;
      }

      .name {
        font-size: 64px;
        font-weight: 900;
        letter-spacing: -0.03em;
        line-height: 1;
        background: linear-gradient(135deg, #fff 0%, #e0e0e0 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .title {
        font-size: 26px;
        font-weight: 400;
        color: #a1a1aa;
        letter-spacing: 0.02em;
      }

      .bar {
        width: 80px;
        height: 4px;
        border-radius: 2px;
        background: linear-gradient(
          90deg,
          oklch(0.558 0.288 302.321),
          oklch(0.592 0.249 0.584),
          oklch(0.702 0.183 58.722)
        );
      }

      .url {
        font-size: 18px;
        color: #71717a;
        letter-spacing: 0.04em;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="content">
        <div class="logo">NB</div>
        <div class="name">Noranda Brown</div>
        <div class="bar"></div>
        <div class="title">Senior Frontend Engineer</div>
        <div class="url">norandabrown.com</div>
      </div>
    </div>
  </body>
</html>
